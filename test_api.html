<!DOCTYPE html>
<html>
<head>
    <title>Test Add Product API</title>
</head>
<body>
    <h1>Test Add Product</h1>
    <button onclick="testAddProduct()">Test Add Product</button>
    <pre id="result"></pre>

    <script>
        async function testAddProduct() {
            const data = {
                nama_produk: 'Test Product Frontend',
                harga: 25000,
                stok: 20,
                kategori: 'Beverages',
                image: 'test-image.jpg'
            };

            try {
                const response = await fetch('http://testtt.test/api/index.php?action=add_product', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                document.getElementById('result').textContent = JSON.stringify(result, null, 2);
                
                if (result.success) {
                    alert('Product added successfully! ID: ' + result.id);
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
