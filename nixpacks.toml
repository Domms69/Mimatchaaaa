[phases.install]
cmds = [
  "npm install --include=dev",
  "composer install --no-interaction --prefer-dist --optimize-autoloader"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p public/dist",
  "cp -r dist/* public/dist/"
]

[start]
cmd = "php -S 0.0.0.0:${PORT} -t public public/index.php"
